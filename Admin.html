<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - BoostifyX</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="firebase.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body class="dark-theme">
    <div class="theme-toggle">
        <button id="themeSwitch" class="neon-btn">🌓</button>
    </div>

    <nav class="glass-nav">
        <div class="logo">BoostifyX Admin</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#" id="adminLogout">Logout</a></li>
        </ul>
    </nav>

    <main class="admin-container">
        <!-- Admin Login Form (hidden after login) -->
        <div id="adminLoginSection" class="glass-card">
            <h2>Admin Login</h2>
            <form id="adminLoginForm">
                <input type="text" id="adminUser" placeholder="Username" required>
                <input type="password" id="adminPass" placeholder="Password" required>
                <button type="submit" class="neon-btn">Login</button>
                <p id="adminLoginMessage"></p>
            </form>
        </div>

        <!-- Admin Panel (hidden initially) -->
        <div id="adminPanel" style="display: none;">
            <div class="glass-card">
                <h2>Pending Orders</h2>
                <div id="pendingOrders"></div>
                <button id="refreshOrders" class="neon-btn">Refresh</button>
            </div>
            <div class="glass-card">
                <h2>Deposit Requests</h2>
                <div id="depositRequests"></div>
                <button id="refreshDeposits" class="neon-btn">Refresh</button>
            </div>
            <div class="glass-card">
                <h2>Add New Service</h2>
                <form id="addServiceForm">
                    <input type="text" id="serviceName" placeholder="Service Name" required>
                    <input type="number" id="servicePrice" placeholder="Price per unit" step="0.01" required>
                    <button type="submit" class="neon-btn">Add Service</button>
                </form>
            </div>
            <div class="glass-card">
                <h2>Edit Services</h2>
                <div id="servicesList"></div>
            </div>
        </div>
    </main>

    <footer class="glass-footer">
        <p>&copy; 2025 BoostifyX Admin</p>
    </footer>
</body>
</html>
